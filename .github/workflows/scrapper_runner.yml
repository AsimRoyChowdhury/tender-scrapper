name: Daily Parallel Tender Scraper

on:
  schedule:
    # Runs at 1:00 UTC, which is exactly 6:30 AM IST 
    - cron: '00 01 * * *'
  workflow_dispatch:  # Allows manual triggering from GitHub UI

jobs:
  run-scrapers:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Node Dependencies
        run: npm install

      # CRITICAL STEP: Installs the headless Chromium browser and Linux dependencies required by Playwright
      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium

      - name: Run run_scrappers_parallely.js
        env:
          # Pulling all your Appwrite credentials from GitHub Secrets
          APPWRITE_ENDPOINT: ${{ secrets.APPWRITE_ENDPOINT }}
          APPWRITE_PROJECT_ID: ${{ secrets.APPWRITE_PROJECT_ID }}
          APPWRITE_API_KEY: ${{ secrets.APPWRITE_API_KEY }}
          APPWRITE_BUCKET_ID: ${{ secrets.APPWRITE_BUCKET_ID }}
        run: node run_scrappers_parallely.js